<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RS Lawn Care | Premium Lawn Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:#f7f7f7;
  --text:#333;
  --card:#fff;
  --green:#27ae60;
}

.dark {
  --bg:#0f172a;
  --text:#f1f5f9;
  --card:#1e293b;
}

body {
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* NAV */
header {
  position:sticky;
  top:0;
  background:#145a32;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img {
  height:50px;
}

nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.toggle {
  cursor:pointer;
  margin-left:20px;
}

/* HERO */
.hero {
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1598514982846-1f1b8baf0da3') center/cover;
  color:white;
  padding:140px 20px;
  text-align:center;
  animation:fadeIn 1.5s ease;
}

.hero h1 {
  font-size:48px;
}

.btn {
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  background:var(--green);
  color:white;
  border-radius:6px;
  text-decoration:none;
}

/* SECTION */
.section {
  padding:70px 20px;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

/* SERVICES */
.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card {
  background:var(--card);
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transform:translateY(30px);
  opacity:0;
  transition:0.6s;
}

.card.show {
  transform:translateY(0);
  opacity:1;
}

/* GALLERY */
.gallery img {
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* BOOKING */
iframe {
  width:100%;
  height:600px;
  border:none;
  border-radius:10px;
}

/* FOOTER */
footer {
  background:#145a32;
  color:white;
  text-align:center;
  padding:20px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <nav>
    <a href="#services">Services</a>
    <a href="#gallery">Work</a>
    <a href="#contact">Book</a>
    <span class="toggle" onclick="toggleDark()">🌙</span>
  </nav>
</header>

<section class="hero">
  <h1>Make Your Lawn Look Like a Showpiece</h1>
  <p>Flagler & Putnam County Lawn Experts</p>
  <a href="tel:3865699501" class="btn">Call Now</a>
</section>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="services">
    <div class="card">Lawn Mowing</div>
    <div class="card">Edging</div>
    <div class="card">Weeding</div>
    <div class="card">Mulch</div>
    <div class="card">Hedge Trimming</div>
    <div class="card">Cleanup</div>
  </div>
</section>

<section id="gallery" class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1592595896616-c37162298647">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
  </div>
</section>

<section id="contact" class="section">
  <h2>Book a Free Estimate</h2>

  <iframe src="https://calendly.com/YOUR-LINK-HERE"></iframe>

  <p><strong>Call/Text:</strong> 386-569-9501</p>
</section>

<footer>
  <p>© 2026 RS Lawn Care</p>
</footer>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* Scroll animation */
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
